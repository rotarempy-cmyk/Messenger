<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIGA MESSENGER</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Контейнеры экранов */
        #auth-container { width: 400px; background: #333; border-radius: 8px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #messenger-container { width: 900px; height: 600px; background: #333; border-radius: 8px; display: none; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Общие стили элементов */
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { padding: 10px; border: none; border-radius: 4px; outline: none; background: #444; color: white; }
        button { background: #007acc; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; min-height: 38px; }
        button:hover { background: #005999; }
        button:disabled { background: #555; cursor: not-allowed; }
        .error { color: #ff6b6b; font-size: 14px; text-align: center; margin: 5px 0; }

        /* Двухпанельный макет мессенджера */
        #sidebar { width: 300px; background: #2b2b2b; display: flex; flex-direction: column; border-right: 1px solid #444; }
        #chat-area { flex: 1; display: flex; flex-direction: column; background: #333; position: relative; }

        /* Боковая панель (Слева) */
        #user-profile { padding: 15px; background: #222; font-weight: bold; border-bottom: 1px solid #444; font-size: 14px; color: #007acc; }
        #search-box { padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid #444; background: #262626; }
        #search-input { flex: 1; padding: 6px; font-size: 13px; }
        #search-btn { min-height: 30px; padding: 5px 10px; font-size: 13px; }
        #chats-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Элемент списка чатов */
        .chat-item { padding: 15px; border-bottom: 1px solid #3c3c3c; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; }
        .chat-item:hover { background: #383838; }
        .chat-item.active { background: #007acc; color: white; }

        /* Окно чата (Справа) */
        #chat-placeholder { flex: 1; display: flex; justify-content: center; align-items: center; color: #777; font-size: 16px; }
        #chat-main { flex: 1; display: none; flex-direction: column; height: 100%; }
        #chat-header { padding: 15px; background: #2b2b2b; font-weight: bold; border-bottom: 1px solid #444; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Сообщения */
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 70%; word-break: break-word; }
        .msg.other { background: #444; align-self: flex-start; }
        .msg.me { background: #007acc; align-self: flex-end; }
        .msg-author { font-size: 11px; color: #aaa; margin-bottom: 3px; display: block; }
        .msg.me .msg-author { color: #bce2ff; }

        /* Область ввода сообщения */
        #input-area { display: flex; padding: 15px; background: #222; gap: 10px; }
        #message-input { flex: 1; }

        /* Спиннер загрузки */
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="auth-container">
    <h2>Вход в GIGA MESSENGER</h2>
    <div class="form-group">
        <input type="text" id="username" placeholder="Имя пользователя">
        <input type="password" id="password" placeholder="Пароль">
    </div>
    <button id="login-btn"><span class="btn-text">Войти</span></button>
    <button id="register-btn" style="background: #444; margin-top: 5px;"><span class="btn-text">Регистрация</span></button>
    <p id="auth-error" class="error"></p>
</div>

<div id="messenger-container">
    <div id="sidebar">
        <div id="user-profile">Вы вошли как: <span id="my-name">...</span></div>
        <div id="search-box">
            <input type="text" id="search-input" placeholder="Введите точный ник..." autocomplete="off">
            <button id="search-btn"><span class="btn-text">Найти</span></button>
        </div>
        <p id="search-error" class="error" style="font-size:12px;"></p>
        <div id="chats-list">
            </div>
    </div>

    <div id="chat-area">
        <div id="chat-placeholder">Выберите чат или найдите пользователя, чтобы начать общение</div>
        
        <div id="chat-main">
            <div id="chat-header">Чат с пользователем: <span id="chat-target-name">...</span></div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const BACKEND_URL = "https://rotarempy-messenger.hf.space"; 
    const SOCKET_URL = "wss://rotarempy-messenger.hf.space";

    let currentUser = null;
    let activeChatId = null;
    let socket = null;

    // Элементы интерфейса
    const authContainer = document.getElementById('auth-container');
    const messengerContainer = document.getElementById('messenger-container');
    const authError = document.getElementById('auth-error');
    const searchError = document.getElementById('search-error');
    const chatsList = document.getElementById('chats-list');
    const chatPlaceholder = document.getElementById('chat-placeholder');
    const chatMain = document.getElementById('chat-main');
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');

    function toggleLoading(button, isLoading) {
        const textSpan = button.querySelector('.btn-text');
        if (isLoading) {
            button.disabled = true;
            if(textSpan) textSpan.style.display = 'none';
            const spinner = document.createElement('div');
            spinner.classList.add('spinner');
            button.appendChild(spinner);
        } else {
            button.disabled = false;
            if(textSpan) textSpan.style.display = 'inline';
            const spinner = button.querySelector('.spinner');
            if (spinner) spinner.remove();
        }
    }

    // Инициализация мессенджера после логина
    function initMessenger(username) {
        currentUser = username;
        authContainer.style.display = 'none';
        messengerContainer.style.display = 'flex';
        document.getElementById('my-name').innerText = currentUser;

        // Подключаем сокеты
        socket = io(SOCKET_URL);

        // Получение истории сообщений при входе в чат комнатку
        socket.on('load_history', (messages) => {
            messagesContainer.innerHTML = '';
            messages.forEach(msg => appendMessage(msg));
        });

        // Получение нового сообщения в реальном времени
        socket.on('receive_message', (msgData) => {
            // Отображаем сообщение только если оно принадлежит открытому чату
            if (msgData.chatId === activeChatId) {
                appendMessage(msgData);
            }
        });

        // Загружаем список чатов пользователя с сервера
        loadMyChats();
    }

    // Загрузка списка чатов с сервера
    async function loadMyChats() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/chats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ myUsername: currentUser })
            });
            const chats = await res.json();
            renderChatsList(chats);
        } catch (err) {
            console.error("Ошибка загрузки списка чатов:", err);
        }
    }

    // Отображение списка чатов на панели слева
    function renderChatsList(chats) {
        chatsList.innerHTML = '';
        if(chats.length === 0) {
            chatsList.innerHTML = '<div style="padding:15px; color:#666; font-size:13px; text-align:center;">У вас пока нет чатов</div>';
            return;
        }

        chats.forEach(chat => {
            // Находим имя собеседника (тот, кто не я)
            const targetUser = chat.participants.find(p => p !== currentUser) || currentUser;
            
            const chatItem = document.createElement('div');
            chatItem.classList.add('chat-item');
            if (chat._id === activeChatId) chatItem.classList.add('active');
            chatItem.innerText = targetUser;
            
            // Клик по чату — открываем переписку
            chatItem.addEventListener('click', () => openChat(chat._id, targetUser));
            chatsList.appendChild(chatItem);
        });
    }

    // Открытие конкретного чата
    function openChat(chatId, targetUser) {
        activeChatId = chatId;
        chatPlaceholder.style.display = 'none';
        chatMain.style.display = 'flex';
        document.getElementById('chat-target-name').innerText = targetUser;

        // Выделяем активный чат в списке слева
        document.querySelectorAll('.chat-item').forEach(item => {
            item.classList.remove('active');
            if(item.innerText === targetUser) item.classList.add('active');
        });

        // Говорим серверу через веб-сокет, что мы зашли в эту комнату чата
        socket.emit('join_chat', { chatId: chatId });
    }

    // Отправка сообщения
    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== '' && activeChatId && currentUser) {
            socket.emit('send_message', { 
                chatId: activeChatId, 
                sender: currentUser, 
                text: text 
            });
            messageInput.value = '';
        }
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    function appendMessage(msgData) {
        const messageElement = document.createElement('div');
        messageElement.classList.add('msg');
        
        if (msgData.sender === currentUser) {
            messageElement.classList.add('me');
        } else {
            messageElement.classList.add('other');
        }

        messageElement.innerHTML = `<span class="msg-author">${msgData.sender}</span>${msgData.text}`;
        messagesContainer.appendChild(messageElement);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Поиск пользователя и создание/открытие чата с ним
    document.getElementById('search-btn').addEventListener('click', async () => {
        const targetInput = document.getElementById('search-input');
        const targetUsername = targetInput.value.trim();
        searchError.innerText = "";

        if(!targetUsername) return;
        if(targetUsername === currentUser) {
            return searchError.innerText = "Нельзя создать чат с самим собой!";
        }

        toggleLoading(document.getElementById('search-btn'), true);

        try {
            // 1. Ищем пользователя в БД по точному нику
            const searchRes = await fetch(`${BACKEND_URL}/api/search-users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: targetUsername })
            });
            const searchData = await searchRes.json();

            if (!searchRes.ok) {
                searchError.innerText = searchData.error || "Пользователь не найден";
                return;
            }

            // 2. Если пользователь найден, запрашиваем или создаем чат с ним
            const chatRes = await fetch(`${BACKEND_URL}/api/chats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ myUsername: currentUser, targetUsername: searchData.username })
            });
            const chatData = await chatRes.json();

            targetInput.value = "";
            // Обновляем список чатов на панели
            await loadMyChats();
            // Сразу открываем этот чат
            openChat(chatData._id, searchData.username);

        } catch (err) {
            searchError.innerText = "Ошибка сети при поиске";
        } finally {
            toggleLoading(document.getElementById('search-btn'), false);
        }
    });

    // Обычная Логика Авторизации (Вход и Регистрация)
    document.getElementById('register-btn').addEventListener('click', async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if(!u || !p) return authError.innerText = "Заполните поля!";
        authError.innerText = "";
        toggleLoading(document.getElementById('register-btn'), true);

        try {
            const res = await fetch(`${BACKEND_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok) {
                authError.style.color = '#6bff6b';
                authError.innerText = "Успешная регистрация! Теперь войдите.";
            } else {
                authError.style.color = '#ff6b6b';
                authError.innerText = data.error;
            }
        } catch (err) {
            authError.innerText = "Ошибка соединения";
        } finally {
            toggleLoading(document.getElementById('register-btn'), false);
        }
    });

    document.getElementById('login-btn').addEventListener('click', async () => {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        if(!u || !p) return authError.innerText = "Заполните поля!";
        authError.innerText = "";
        toggleLoading(document.getElementById('login-btn'), true);

        try {
            const res = await fetch(`${BACKEND_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (res.ok) {
                initMessenger(data.username);
            } else {
                authError.style.color = '#ff6b6b';
                authError.innerText = data.error;
            }
        } catch (err) {
            authError.innerText = "Ошибка соединения";
        } finally {
            toggleLoading(document.getElementById('login-btn'), false);
        }
    });
</script>
</body>
</html>
